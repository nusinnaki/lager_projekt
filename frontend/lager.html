<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lager</title>
  <link rel="stylesheet" href="./styles.css" />

  <style>
    body { background: #fff; }
    .panel { background: #eee; }

    .topRow {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
    }

    .userBox {
      font-size: 14px;
      color: #333;
      text-align: right;
    }

    .userLink {
      cursor: pointer;
      text-decoration: underline;
      font-weight: 700;
    }

    .topButtons {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .scanRow,
    .actionRow,
    .stockTools {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .actionRow {
      display: none;
    }

    .actionBtn {
      flex: 1;
      text-align: center;
      font-weight: 800;
      letter-spacing: .5px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,.18);
      background: #fff;
      cursor: pointer;
    }

    .actionBtn:hover {
      background: rgba(0,0,0,.04);
    }

    .actionBtn.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .confirmBox {
      display: none;
      margin-top: 16px;
      padding: 14px;
      border: 1px solid rgba(0,0,0,.12);
      border-radius: 14px;
      background: #fff;
    }

    .confirmTitle {
      font-weight: 800;
      margin-bottom: 12px;
    }

    .confirmGrid,
    .passwordGrid {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 10px 14px;
      align-items: center;
    }

    .confirmLabel {
      font-weight: 700;
    }

    .confirmValue {
      word-break: break-word;
    }

    .qtyRow {
      margin-top: 12px;
    }

    .qtyRow input {
      max-width: 140px;
    }

    .confirmActions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    #qrScanBox,
    #stockQrScanBox {
      display: none;
      margin-top: 14px;
    }

    #qrReader,
    #stockQrReader {
      width: 100%;
      max-width: 520px;
    }

    .scannerHint {
      margin-top: 10px;
      font-size: 14px;
      color: #444;
    }

    .stockSearch {
      flex: 1;
      min-width: 220px;
    }

    .hidden {
      display: none !important;
    }

    .modalWrap {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 999;
      padding: 20px;
    }

    .modalCard {
      max-width: 520px;
      margin: 60px auto 0;
      background: #fff;
      border-radius: 16px;
      border: 1px solid #ddd;
      box-shadow: 0 12px 30px rgba(0,0,0,.15);
      overflow: hidden;
    }

    .modalHeader {
      padding: 14px 16px;
      font-weight: 800;
      border-bottom: 1px solid #e5e5e5;
      background: #f8f8f8;
    }

    .modalBody {
      padding: 16px;
    }

    .modalActions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    @media (max-width: 760px) {
      .confirmGrid,
      .passwordGrid {
        grid-template-columns: 1fr;
      }

      .topRow {
        flex-direction: column;
      }

      .userBox {
        text-align: left;
      }

      .topButtons {
        justify-content: flex-start;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <header class="header">
      <div class="topRow">
        <div></div>

        <div class="userBox">
          <div id="currentUserName" class="userLink">-</div>
          <div class="topButtons">
            <button id="adminBtn" class="btn hidden" type="button">Admin</button>
            <button id="logoutBtn" class="btn" type="button">Abmelden</button>
          </div>
        </div>
      </div>
    </header>

    <section class="panel">
      <div class="panelBody">
        <div class="scanRow">
          <button id="qrScanBtn" class="btn primary" type="button">Scannen</button>
          <button id="qrStopBtn" class="btn" type="button" style="display:none;">Stopp</button>
        </div>

        <div id="qrScanBox">
          <div id="qrReader"></div>
          <div class="scannerHint">Kamera auf den QR-Code richten</div>
        </div>

        <div id="actionRow" class="actionRow">
          <button id="modeLoad" class="actionBtn" type="button">Einlagern</button>
          <button id="modeTake" class="actionBtn" type="button">Entnehmen</button>
        </div>

        <div id="confirmBox" class="confirmBox">
          <div class="confirmTitle">Eintrag prüfen</div>

          <div class="confirmGrid">
            <div class="confirmLabel">Mitarbeiter</div>
            <div id="confirmWorker" class="confirmValue">-</div>

            <div class="confirmLabel">Aktion</div>
            <div id="confirmAction" class="confirmValue">-</div>

            <div class="confirmLabel">Lager</div>
            <div id="confirmLager" class="confirmValue">-</div>

            <div class="confirmLabel">Produkt-ID</div>
            <div id="confirmProductId" class="confirmValue">-</div>

            <div class="confirmLabel">Produkt</div>
            <div id="confirmProductName" class="confirmValue">-</div>

            <div class="confirmLabel">NC Nummer</div>
            <div id="confirmNcNummer" class="confirmValue">-</div>
          </div>

          <div class="qtyRow">
            <label for="qty" class="confirmLabel">Menge</label>
            <input id="qty" class="input" type="number" min="1" step="1" value="1" />
          </div>

          <div class="confirmActions">
            <button id="confirmBtn" class="btn primary" type="button">Bestätigen</button>
            <button id="resetBtn" class="btn" type="button">Zurücksetzen</button>
          </div>
        </div>

        <div id="msg" class="msg"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panelBody">
        <div class="stockTools">
          <button id="stockScanBtn" class="btn" type="button">Scan</button>
          <input id="stockSearch" class="input stockSearch" type="text" placeholder="Suche nach Produkt oder ID" />
          <button id="stockClearBtn" class="btn" type="button">Zurücksetzen</button>
        </div>

        <div id="stockQrScanBox">
          <div id="stockQrReader"></div>
          <div class="scannerHint">Kamera auf den QR-Code richten</div>
        </div>

        <div class="tableWrap" style="margin-top:14px;">
          <table class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Produkt</th>
                <th class="right">Konstanz</th>
                <th class="right">Sindelfingen</th>
                <th class="right">Gesamt</th>
              </tr>
            </thead>
            <tbody id="stockBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <div id="passwordModal" class="modalWrap">
    <div class="modalCard">
      <div class="modalHeader">Passwort ändern</div>
      <div class="modalBody">
        <div class="passwordGrid">
          <div class="confirmLabel">Altes Passwort</div>
          <input id="oldPassword" class="input" type="password" placeholder="Altes Passwort" />

          <div class="confirmLabel">Neues Passwort</div>
          <input id="newPassword" class="input" type="password" placeholder="Neues Passwort" />
        </div>

        <div class="modalActions">
          <button id="savePasswordBtn" class="btn primary" type="button">Speichern</button>
          <button id="closePasswordBtn" class="btn" type="button">Schließen</button>
        </div>

        <div id="passwordMsg" class="msg"></div>
      </div>
    </div>
  </div>

  <script src="./api.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="./take_load.js"></script>

  <script>
    const userRaw = localStorage.getItem("lager_user");
    const token = localStorage.getItem("lager_token");
    const currentUserName = document.getElementById("currentUserName");
    const logoutBtn = document.getElementById("logoutBtn");
    const adminBtn = document.getElementById("adminBtn");

    if (!token || !userRaw) {
      location.href = "./index.html";
    }

    if (userRaw) {
      try {
        const user = JSON.parse(userRaw);
        const first = user.first_name || "";
        const last = user.last_name || "";
        const username = user.username || "";
        currentUserName.textContent = [first, last].join(" ").trim() || username || "-";

        if (user.is_admin && adminBtn) {
          adminBtn.classList.remove("hidden");
        }
      } catch {
        currentUserName.textContent = "-";
      }
    }

    if (adminBtn) {
      adminBtn.addEventListener("click", () => {
        location.href = "./admin.html";
      });
    }

    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem("lager_token");
      localStorage.removeItem("lager_user");
      location.href = "./index.html";
    });
  </script>
</body>
</html>
