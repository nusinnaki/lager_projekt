<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lager Admin</title>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>Admin</h1>
    </header>

    <section class="card">
      <div class="tabs">
        <button id="tabUsers" class="primary" type="button">Mitarbeiter</button>
        <button id="tabProducts" type="button">Produkte</button>
        <button id="tabSites" type="button">Standorte</button>
        <button id="tabLogs" type="button">Logs</button>
        <button id="backToLagerBtn" type="button">Zurück zu Lager</button>
      </div>
      <div id="adminMsg" class="msg"></div>
    </section>

    <section id="usersSection" class="card">
      <h2 class="section-title">Mitarbeiter</h2>

      <div class="toolbar">
        <button id="newWorkerBtn" type="button">Neuer Mitarbeiter</button>
      </div>

      <form id="workerForm" class="form-grid form-grid-wide hidden">
        <label for="workerFirstName">Vorname</label>
        <input id="workerFirstName" type="text" />

        <label for="workerLastName">Nachname</label>
        <input id="workerLastName" type="text" />

        <label for="workerUsername">Username</label>
        <input id="workerUsername" type="text" placeholder="wird automatisch erstellt" />



        <label for="workerAdmin">Rolle</label>
        <select id="workerAdmin">
          <option value="false">Techniker</option>
          <option value="true">Admin</option>
        </select>

        <label for="workerActive">Aktiv</label>
        <select id="workerActive">
          <option value="true">Ja</option>
          <option value="false">Nein</option>
        </select>

        <div></div>
        <div class="form-actions">
          <button id="saveWorkerBtn" class="primary" type="submit">Speichern</button>
          <button id="cancelWorkerCreateBtn" type="button">Abbrechen</button>
        </div>
      </form>

      <div class="toolbar">
      </div>


      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th></th>
              <th>ID</th>
              <th>Vorname</th>
              <th>Nachname</th>
              <th>Username</th>
              <th>Rolle</th>
              <th>Aktiv</th>
              <th>Passwort</th>
            </tr>
          </thead>
          <tbody id="usersBody"></tbody>
        </table>
      </div>
    </section>

    <section id="productsSection" class="card hidden">
      <h2 class="section-title">Produkte</h2>

      <div class="toolbar">
        <button id="newProductBtn" type="button">Neues Produkt</button>
</div>

      <form id="productForm" class="form-grid form-grid-wide hidden">
        <label for="productName">Produktname</label>
        <input id="productName" type="text" />

        <label for="productCategory">Kategorie</label>
        <select id="productCategory"></select>

        <label id="productCategoryNewLabel" class="hidden" for="productCategoryNew">Neue Kategorie</label>
        <input id="productCategoryNew" class="hidden" type="text" />

        <label for="productBrand">Brand</label>
        <select id="productBrand"></select>

        <label id="productBrandNewLabel" class="hidden" for="productBrandNew">Neue Brand</label>
        <input id="productBrandNew" class="hidden" type="text" />

        <label for="productActive">Aktiv</label>
        <select id="productActive">
          <option value="true">Ja</option>
          <option value="false">Nein</option>
        </select>

        <label id="productNcLabel" class="hidden" for="productNc">NC Nummer</label>
        <input id="productNc" class="hidden" type="text" />

        <div></div>
        <div class="form-actions">
          <button id="saveProductBtn" class="primary" type="submit">Speichern</button>
          <button id="cancelProductBtn" type="button">Abbrechen</button>
        </div>
      </form>

      <div class="toolbar">
        <button id="printQrBtn" type="button">QR Codes</button>

        <button
          id="cancelQrModeBtn"
          class="hidden"
          type="button"
        >
          Abbrechen
        </button>

        <input
          id="productSearch"
          type="text"
          placeholder="Produkt, ID, NC Nummer, Kategorie oder Brand suchen"
        />
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Produktname</th>
              <th>Kategorie</th>
              <th>Brand</th>
              <th>NC Nummer</th>
              <th>Aktiv</th>
              <th>Passwort</th>
            </tr>
          </thead>
          <tbody id="productsBody"></tbody>
        </table>
      </div>
    </section>

    <section id="sitesSection" class="card hidden">
      <h2 class="section-title">Standorte</h2>

      <div class="toolbar">
        <button id="newStandortBtn" type="button">Neuer Standort</button>
      </div>

      <form id="siteForm" class="form-grid form-grid-wide hidden">
        <label for="siteName">Name</label>
        <input id="siteName" type="text" />

        <label for="siteActive">Aktiv</label>
        <select id="siteActive">
          <option value="true">Ja</option>
          <option value="false">Nein</option>
        </select>

        <div></div>
        <div class="form-actions">
          <button id="saveStandortBtn" class="primary" type="submit">Standort speichern</button>
        </div>
      </form>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Aktiv</th>
              <th>Passwort</th>
            </tr>
          </thead>
          <tbody id="sitesBody"></tbody>
        </table>
      </div>
    </section>

    <section id="logsSection" class="card hidden">
      <h2 class="section-title">Logs</h2>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Zeit</th>
              <th>Passwort</th>
              <th>Produkt-ID</th>
              <th>Produkt</th>
              <th>Menge</th>
              <th>Standort</th>
              <th>Regal</th>
              <th>Fach</th>
              <th>Mitarbeiter</th>
            </tr>
          </thead>
          <tbody id="adminLogsBody"></tbody>
        </table>
      </div>
    </section>

  </main>


  <div id="qrStandortModal" class="modal-wrap hidden">
    <div class="modal-card qr-site-modal">
      <div class="modal-header">Standort auswählen</div>

      <div class="modal-body">
        <label for="qrStandortSelect">Standort</label>
        <select id="qrStandortSelect"></select>

        <div class="toolbar">
          <button id="qrStandortConfirmBtn" class="primary" type="button">Drucken</button>
          <button id="qrStandortCancelBtn" type="button">Abbrechen</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api/client.js"></script>
  <script src="/js/api/admin.js"></script>
  <script src="/js/api/history.js"></script>
  <script src="/js/pages/admin.js"></script>
</div>
</div>
</div>
</div>

</body>
</html>
